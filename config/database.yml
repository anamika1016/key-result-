default: &default
  adapter: postgresql
  encoding: unicode
  username: postgres
  password: postgres
  host: localhost
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: myapp_development   # 🔄 changed

test:
  <<: *default
  database: myapp_test          # 🔄 changed

production:
  primary:
    adapter: postgresql
    encoding: unicode
    database: myapp_primary_production   # 🔄 changed
    pool: 5
    username: myuser
    password: <%= ENV['MYAPP_DATABASE_PASSWORD'] %>
    host: localhost

  cable:
    adapter: postgresql
    encoding: unicode
    database: myapp_cable_production     # 🔄 changed
    pool: 5
    username: myuser
    password: <%= ENV['MYAPP_DATABASE_PASSWORD'] %>
    host: localhost

  # Optional: remove this block if not needed
  <<: *default
  database: myapp_production             # 🔄 changed
  username: <%= ENV['PG_USERNAME'] || 'postgres' %>
  password: <%= ENV['PG_PASSWORD'] || 'postgres' %>
